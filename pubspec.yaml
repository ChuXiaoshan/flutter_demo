name: flutterdemo
description: A new Flutter demo application.

version: 1.0.0+1

environment:
  sdk: ">=2.7.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  dio: ^3.0.9
  cupertino_icons: ^0.1.3
  flutter_swiper: ^1.1.6
  flutter_custom_clippers: ^1.1.0
  cached_network_image: ^2.2.0
  webview_flutter: ^0.3.22+1
  font_awesome_flutter: ^8.5.0
  flutter_blurhash: ^0.5.0
  flutter_easyrefresh: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/images/search_black.webp
    - assets/images/tabbar_chat_c.webp
    - assets/images/tabbar_chat_s.webp
    - assets/images/tabbar_contacts_c.webp
    - assets/images/tabbar_contacts_s.webp
    - assets/images/tabbar_discover_c.webp
    - assets/images/tabbar_discover_s.webp
    - assets/images/tabbar_me_c.webp
    - assets/images/tabbar_me_s.webp
